name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run tests (標準ライブラリのみ・追加インストール不要)
        run: python -m unittest discover -s tests -v
      - name: Smoke test server boot & API
        run: python scripts/smoke.py
      - name: AI分析manifest整合検証 (analysis/が無い/空でも正常終了)
        run: python scripts/check_analysis.py --data frontend/data
      - name: Check static (GitHub Pages) local API
        run: node scripts/check_local_api.mjs
      - name: Install frontend dev dependencies (jsdom)
        run: npm ci
      - name: Frontend gate (構文 + データ層 + UIスモーク)
        run: npm run gate
      - name: PBR/ROE/自己資本比率の分母チェック
        run: node scripts/check_pbr.mjs
