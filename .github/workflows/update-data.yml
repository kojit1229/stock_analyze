name: Update market data

on:
  schedule:
    # JST 9:05 / 12:05 / 15:35 / 18:05 / 21:05 (平日) — 決算発表が集中する
    # 引け後の時間帯を含め1日複数回更新する (要件9.2)
    - cron: '5 0,3,9,12 * * 1-5'
    - cron: '35 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pandas xlrd openpyxl
      - name: Fetch real data (JPX / TDnet / Yahoo)
        run: python scripts/fetch_real_data.py --out frontend/data
      - name: Track price reactions (イベント→株価反応の記録)
        continue-on-error: true
        run: python scripts/track_reactions.py --data frontend/data
      - name: Market summary snapshot (市況概況の日次保存 JSON+MD)
        continue-on-error: true
        run: python scripts/market_summary.py --data frontend/data
      - name: Generate scores (決算スコアリングv1・ルールベース)
        continue-on-error: true
        run: python scripts/generate_scores.py --data frontend/data
      - name: Generate price alerts (マイ銘柄の終値アラート)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_alerts.py --data frontend/data --user config/user_data.json
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data frontend/pdfs
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "データ更新: 決算予定・決算短信 (自動)"
            git pull --rebase origin main || true
            git push origin main
          fi
