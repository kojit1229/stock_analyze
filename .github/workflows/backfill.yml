name: Backfill disclosure history

on:
  schedule:
    # 毎時実行し、開示アーカイブ(過去2年分)を段階的に構築する。
    # 2年分に到達すると自動的に何もしなくなる (complete フラグ)。
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data   # update-data と同じグループにして直列化する
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Backfill disclosure history (25営業日/回)
        run: python scripts/fetch_real_data.py --out frontend/data --backfill-only --backfill-days 25
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "開示アーカイブ更新: 過去分バックフィル (自動)"
            git pull --rebase origin main || true
            git push origin main
          fi
